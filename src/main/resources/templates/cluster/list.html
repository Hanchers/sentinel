<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <th:block th:insert="~{include :: header('服务集群列表')}"/>
    <th:block th:insert="~{include :: select2-css}"/>
</head>
<body class="sentinel-page">
<div class="page-wrapper">
    <!-- 页面标题 -->
    <div class="page-title">
        <span><i class="fa-solid fa-layer-group"></i>服务集群列表</span>
        <div class="d-flex gap-2">
            <button type="button" class="btn btn-outline-secondary btn-refresh" onclick="location.reload()">
                <i class="fa-solid fa-arrows-rotate"></i>刷新
            </button>
            <button type="button" class="btn btn-add" data-bs-toggle="modal" data-bs-target="#addClusterModel">
                <i class="fa-solid fa-plus"></i>新增服务集群
            </button>
        </div>
    </div>

    <!-- 数据表格 -->
    <div class="sentinel-card">
        <div class="card-body-custom p-0">
            <table class="table sentinel-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>名称</th>
                    <th>备注</th>
                    <th>状态</th>
                    <th>最小存活数量</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="cluster : ${pageInfo.list}">
                    <td><span class="fw-semibold">#<span th:text="${cluster.id}"></span></span></td>
                    <td><span class="fw-semibold" th:text="${cluster.name}"></span></td>
                    <td><span class="text-muted" th:text="${cluster.remark}"></span></td>
                    <td>
                        <span class="status-badge"
                              th:classappend="${cluster.status.name() == 'ok'} ? 'status-ok' : (${cluster.status.name() == 'up'} ? 'status-up' : (${cluster.status.name() == 'wait'} ? 'status-wait' : 'status-down'))"
                              th:text="${cluster.status}"></span>
                    </td>
                    <td><span class="badge bg-light text-dark" th:text="${cluster.minAliveNum}"></span></td>
                    <td class="action-buttons">
                        <button class="btn btn-sm btn-outline-primary btn-action" data-bs-toggle="modal"
                                data-bs-target="#addClusterModel" th:data-row="${jsonMapper.writeValueAsString(cluster)}">
                            <i class="fa-solid fa-pen-to-square me-1"></i>编辑
                        </button>
                        <button class="btn btn-sm btn-outline-danger btn-action" data-bs-toggle="modal"
                                data-bs-target="#confirmDeleteModal"
                                th:data-id="${cluster.id}" th:data-name="${cluster.name}">
                            <i class="fa-solid fa-trash-can me-1"></i>删除
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 分页组件 -->
    <div th:if="${pageInfo.totalPages > 1}" class="sentinel-pagination"
         th:replace="~{component/pagination :: pagination(${pageInfo}, '/cluster/list')}">
    </div>

    <!-- 新增/编辑集群弹窗 -->
    <div class="modal fade sentinel-modal" id="addClusterModel" tabindex="-1" role="dialog"
         aria-labelledby="addClusterModelLabel" data-bs-backdrop="static" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <form id="addClusterForm" th:action="@{/cluster/save}" method="post" th:object="${clusterParam}">
                <input type="hidden" name="id" id="add-id"/>
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">
                            <i class="fa-solid fa-layer-group me-2"></i>新增服务集群
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
                    </div>
                    <div class="modal-body px-4 py-4">
                        <h6 class="section-title">
                            <i class="fa-solid fa-info-circle me-1"></i>基本信息
                        </h6>

                        <div class="mb-3 row">
                            <label class="col-sm-3 col-form-label">集群名称 <span class="text-danger">*</span></label>
                            <div class="col-sm-9">
                                <input id="add-name" type="text" class="form-control" name="name"
                                       placeholder="请输入集群名称" required/>
                            </div>
                        </div>
                        <div class="mb-3 row">
                            <label class="col-sm-3 col-form-label">集群备注</label>
                            <div class="col-sm-9">
                                <input id="add-remark" type="text" class="form-control" name="remark"
                                       placeholder="请输入集群备注"/>
                            </div>
                        </div>
                        <div class="mb-3 row">
                            <label class="col-sm-3 col-form-label">最小存活 <span class="text-danger">*</span></label>
                            <div class="col-sm-9">
                                <input id="add-minAliveNum" type="number" name="minAliveNum" value="1" min="1"
                                       class="form-control" style="max-width: 120px;" required/>
                                <div class="form-text">集群最少存活节点数量，低于此数量则集群判定为下线</div>
                            </div>
                        </div>

                        <h6 class="section-title mt-4">
                            <i class="fa-solid fa-diagram-project me-1"></i>依赖配置
                        </h6>

                        <div class="mb-3 row">
                            <label class="col-sm-3 col-form-label">上游依赖 <span class="text-danger">*</span></label>
                            <div class="col-sm-9">
                                <select id="add-dependClusters" name="dependClusters"
                                        class="form-select select2-multiple" multiple>
                                    <option th:each="cluster : ${clusterOption}" th:value="${cluster.value}"
                                            th:text="${cluster.text}"></option>
                                </select>
                                <div class="form-text">选择本集群依赖的上游集群</div>
                            </div>
                        </div>
                    </div>

                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="fa-solid fa-check me-1"></i>保存
                        </button>
                        <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">
                            <i class="fa-solid fa-xmark me-1"></i>取消
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- 删除二次确认弹窗 -->
    <div class="modal fade sentinel-modal danger-modal" id="confirmDeleteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form th:action="@{/cluster/delete}" method="post">
                    <input type="hidden" name="id" id="deleteClusterId"/>
                    <div class="modal-header">
                        <h5 class="modal-title">
                            <i class="fa-solid fa-triangle-exclamation me-2"></i>确认删除
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
                    </div>
                    <div class="modal-body text-center py-4">
                        <i class="fa-solid fa-circle-exclamation text-danger" style="font-size: 3rem;"></i>
                        <p class="mt-3 mb-0 fs-5">确定要删除集群 <strong class="text-danger" id="deleteClusterName"></strong> 吗？</p>
                        <p class="text-muted small mt-2">该操作不可撤销</p>
                    </div>
                    <div class="modal-footer justify-content-center">
                        <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">
                            <i class="fa-solid fa-xmark me-1"></i>取消
                        </button>
                        <button type="submit" class="btn btn-danger px-4">
                            <i class="fa-solid fa-trash-can me-1"></i>确认删除
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>

<th:block th:insert="~{include :: footer}"/>
<script>
    $('#addClusterModel').on('shown.bs.modal', function (event) {
        const $select = $('#add-dependClusters');
        // 清空数据
        $('#addClusterForm')[0].reset();
        $select.val(null).trigger('change');

        // 如果是编辑，初始化数据
        const button = event.relatedTarget;
        if (button.textContent.trim().includes('编辑')) {
            const row = JSON.parse(button.getAttribute("data-row"));
            const modal = $(this);
            for (let key in row) {
                const input = modal.find('#add-' + key);
                if (input.length > 0) {
                    input.val(row[key]).trigger('change');
                }
            }
        }
        // 渲染select2
        if (!$select.hasClass("select2-hidden-accessible")) {
            $select.select2({
                dropdownParent: $('#addClusterModel'),
                placeholder: "请选择上游依赖集群",
                allowClear: true
            });
        }
    });

    $('#confirmDeleteModal').on('show.bs.modal', function (event) {
        const button = event.relatedTarget;
        const id = button.getAttribute('data-id');
        const name = button.getAttribute('data-name');
        const modal = $(this);
        modal.find('#deleteClusterId').val(id);
        modal.find('#deleteClusterName').text(name);
    });
</script>
<th:block th:insert="~{include :: select2-js}"/>
</body>
</html>
