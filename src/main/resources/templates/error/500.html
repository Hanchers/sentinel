<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <th:block th:insert="~{include :: header('哨兵监控 - 500')}"/>
</head>
<body class="error-page">
<div class="error-card">
    <div class="error-code">500</div>
    <div class="error-title">服务器内部错误</div>
    <p class="error-desc">
        服务器遇到意外情况，无法完成请求。我们对此感到抱歉，请稍后重试或返回首页。
    </p>
    <a href="javascript:index()" class="btn btn-back">
        <i class="fa-solid fa-house me-1"></i>返回首页
    </a>
</div>
<script th:inline="javascript">
    var ctx = [[@{/}]];
    function index() {
        window.top.location = ctx + "index";
    }
</script>
</body>
</html>
