<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <th:block th:insert="~{include :: header('哨兵监控 - 404')}"/>
</head>
<body class="error-page">
<div class="error-card">
    <div class="error-code">404</div>
    <div class="error-title">找不到网页</div>
    <p class="error-desc">
        抱歉，您正在寻找的页面不存在。请检查 URL 是否正确，或返回首页浏览其他内容。
    </p>
    <a href="javascript:index()" class="btn btn-back">
        <i class="fa-solid fa-house me-1"></i>返回首页
    </a>
</div>
<script th:inline="javascript">
    var ctx = [[@{/}]];
    function index() {
        window.top.location = ctx + "index";
    }
</script>
</body>
</html>
