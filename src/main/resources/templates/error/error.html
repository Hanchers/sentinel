<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>错误提示</title>
    <th:block th:insert="~{include :: header('系统发生异常')}"/>
</head>
<body>
<div class="container mt-5">
    <div class="alert alert-danger" role="alert">
        <h4 class="alert-heading">操作失败</h4>
        <p th:text="${errorMessage ?: '系统发生未知错误'}"></p>
        <hr>
        <p class="mb-0" th:if="${errorDetail}" th:text="${errorDetail}"></p>
        <a href="javascript:history.back()" class="btn btn-primary mt-3">返回上一页</a>
    </div>
</div>
</body>
</html>
