<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>错误提示</title>
    <th:block th:insert="~{include :: header('系统发生异常')}"/>
</head>
<body class="sentinel-page">
<div class="error-container">
    <div class="alert alert-danger" role="alert">
        <h4 class="alert-heading">
            <i class="fa-solid fa-circle-exclamation me-2"></i>操作失败
        </h4>
        <p class="mt-3" th:text="${errorMessage ?: '系统发生未知错误'}"></p>
        <hr>
        <p class="mb-0 small text-muted" th:if="${errorDetail}" th:text="${errorDetail}"></p>
        <a href="javascript:history.back()" class="btn btn-primary mt-3 rounded-pill px-4">
            <i class="fa-solid fa-arrow-left me-1"></i>返回上一页
        </a>
    </div>
</div>
</body>
</html>
