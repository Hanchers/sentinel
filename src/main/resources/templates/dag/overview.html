<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>服务依赖关系</title>
    <th:block th:insert="~{include :: g6-js}"/>
</head>
<body>
<!-- 准备一个容器 -->
<div id="container"></div>
<!--<script src="https://unpkg.com/@antv/g6@5/dist/g6.min.js"></script>-->
<script th:inline="javascript">
    const { Graph } = G6;

    const data =  /*[[${dagData}]]*/ {
        nodes: [],
        edges: []
    };

    const graph = new Graph({
      container: 'container',
      data,
      node: {
        style: {
          size: (d) => d.size,
          labelText: (d) => d.label,
          fill: (d) => d.color,
        },
      },
      edge: {
        style: {
           endArrow: true,
        },
      },
      layout: {
        type: 'antv-dagre',
        rankdir: 'LR',
        nodeSize: (d) => d.size,
        nodesep: 40,
        ranksep: 80,
      },
      behaviors:  ['drag-element', 'drag-canvas'],
    });

    graph.render();
</script>
</body>
</html>
