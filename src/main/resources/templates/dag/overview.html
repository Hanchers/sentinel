<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>服务依赖关系</title>
    <th:block th:insert="~{include :: g6-js}"/>
</head>
<body>
<!-- 准备一个容器 -->
<div id="container" style="width: 100%"></div>
<!--<script src="https://unpkg.com/@antv/g6@5/dist/g6.min.js"></script>-->
<script th:inline="javascript">
    const { Graph } = G6;

    const data =  /*[[${dagData}]]*/ {
        nodes: [],
        edges: []
    };

    const graph = new Graph({
        container: 'container',
      data,
      node: {
        style: {
          size: (d) => d.size,
          labelText: (d) => d.label,
        },
      },
      edge: {
        style: {
           endArrow: true,
        },
      },
      layout: {
        type: 'd3-force',
        link: {
          distance: (d) => {
            if (d.source.nodeType === 'cluster') {
              return 100;
            }
            return 30;
          },
          strength: (d) => {
            if (d.source.nodeType === 'cluster') {
              return 0.7;
            }
            return 0.1;
          },
        },
        manyBody: {
          strength: (d) => {
            if (d.nodeType === 'cluster') {
              return -50;
            }
            return -10;
          },
        },
      },
      behaviors: ['drag-element-force'],
    });

    graph.render();
</script>
</body>
</html>
