<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">

<!-- еҲҶйЎөз»„д»¶ -->
<div th:fragment="pagination(pageInfo, baseUrl)" class="pagination-container">
    <div th:if="${pageInfo.pages > 1}" class="d-flex justify-content-center">
        <nav aria-label="еҲҶйЎөеҜјиҲӘ">
            <ul class="pagination">
                <!-- дёҠдёҖйЎө -->
                <li class="page-item" th:classappend="${pageInfo.currentPage == 1} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{${baseUrl}(page=${pageInfo.currentPage - 1}, pageSize=${pageInfo.pageSize})}"
                       th:if="${currentPage > 1}">дёҠдёҖйЎө</a>
                    <span class="page-link" th:if="${pageInfo.currentPage == 1}">дёҠдёҖйЎө</span>
                </li>

                <!-- йЎөз Ғ -->
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(1, pageInfo.pages)}"
                    th:classappend="${i == pageInfo.currentPage} ? 'active'">
                    <a class="page-link"
                       th:href="@{${baseUrl}(page=${i}, pageSize=${pageInfo.pageSize})}"
                       th:text="${i}"></a>
                </li>

                <!-- дёӢдёҖйЎө -->
                <li class="page-item" th:classappend="${pageInfo.currentPage == pageInfo.pages} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{${baseUrl}(page=${pageInfo.currentPage + 1}, pageSize=${pageInfo.pageSize})}"
                       th:if="${pageInfo.currentPage < pageInfo.pages}">дёӢдёҖйЎө</a>
                    <span class="page-link" th:if="${pageInfo.currentPage == pageInfo.pages}">дёӢдёҖйЎө</span>
                </li>
            </ul>
        </nav>
    </div>

    <!-- еҲҶйЎөдҝЎжҒҜ -->
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <span th:text="'е…ұ ' + ${pageInfo.rows} + ' жқЎи®°еҪ•'"></span>
        </div>
        <div>
            <form th:action="@{${baseUrl}}" method="get" class="d-flex">
                <select name="pageSize" class="form-select form-select-sm" onchange="this.form.submit()">
                    <option value="5" th:selected="${pageInfo.pageSize == 5}">5жқЎ/йЎө</option>
                    <option value="10" th:selected="${pageInfo.pageSize == 10}">10жқЎ/йЎө</option>
                    <option value="20" th:selected="${pageInfo.pageSize == 20}">20жқЎ/йЎө</option>
                    <!--                <option value="50" th:selected="${pageSize == 50}">50жқЎ/йЎө</option>-->
                </select>
                <input type="hidden" name="page" value="1">
            </form>
        </div>
    </div>
</div>
