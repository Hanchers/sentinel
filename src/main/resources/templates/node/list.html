<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <th:block th:insert="~{include :: header('服务节点列表')}"/>
    <th:block th:insert="~{include :: select2-css}"/>
</head>
<body class="sentinel-page">
<div class="page-wrapper">
    <!-- 页面标题 -->
    <div class="page-title">
        <span><i class="fa-solid fa-cubes"></i>服务节点列表</span>
        <div class="d-flex gap-2">
            <button type="button" class="btn btn-outline-secondary btn-refresh" onclick="location.reload()">
                <i class="fa-solid fa-arrows-rotate"></i>刷新
            </button>
            <button type="button" class="btn btn-add" data-bs-toggle="modal" data-bs-target="#addNodeModel">
                <i class="fa-solid fa-plus"></i>新增服务节点
            </button>
        </div>
    </div>

    <!-- 数据表格 -->
    <div class="sentinel-card">
        <div class="card-body-custom p-0">
            <table class="table sentinel-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>名称</th>
                    <th>备注</th>
                    <th>状态</th>
                    <th>所属集群</th>
                    <th>健康检查类型</th>
                    <th>节点重启类型</th>
                    <th style="width: 360px; min-width: 360px;">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="node : ${pageInfo.list}">
                    <td><span class="fw-semibold">#<span th:text="${node.id}"></span></span></td>
                    <td><span class="fw-semibold" th:text="${node.name}"></span></td>
                    <td><span class="text-muted" th:text="${node.remark}"></span></td>
                    <td>
                        <span class="status-badge"
                              th:classappend="${node.status.name() == 'ok'} ? 'status-ok' : (${node.status.name() == 'up'} ? 'status-up' : (${node.status.name() == 'wait'} ? 'status-wait' : 'status-down'))"
                              th:text="${node.status}"></span>
                    </td>
                    <td><span class="badge bg-light text-dark" th:text="${node.clusterId}"></span></td>
                    <td><span class="small" th:text="${node.healthCheckMethod}"></span></td>
                    <td><span class="small" th:text="${node.restartMethod}"></span></td>
                    <td class="action-buttons">
                        <button class="btn btn-sm btn-outline-success btn-action btn-node-health"
                                th:data-id="${node.id}" th:data-name="${node.name}">
                            <i class="fa-solid fa-stethoscope me-1"></i>检查
                        </button>
                        <button class="btn btn-sm btn-outline-warning btn-action btn-node-restart"
                                th:data-id="${node.id}" th:data-name="${node.name}">
                            <i class="fa-solid fa-rotate-right me-1"></i>重启
                        </button>
                        <button class="btn btn-sm btn-outline-primary btn-action" data-bs-toggle="modal"
                                name="edit" data-bs-target="#addNodeModel"
                                th:data-row="${jsonMapper.writeValueAsString(node)}">
                            <i class="fa-solid fa-pen-to-square me-1"></i>编辑
                        </button>
                        <button class="btn btn-sm btn-outline-danger btn-action" data-bs-toggle="modal"
                                data-bs-target="#confirmDeleteModal"
                                th:data-id="${node.id}" th:data-name="${node.name}">
                            <i class="fa-solid fa-trash-can me-1"></i>删除
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 分页组件 -->
    <div th:if="${pageInfo.totalPages > 1}" class="sentinel-pagination"
         th:replace="~{component/pagination :: pagination(${pageInfo}, '/node/list')}">
    </div>

    <!-- 新增/编辑节点弹窗 -->
    <div class="modal fade sentinel-modal" id="addNodeModel" tabindex="-1" role="dialog"
         aria-labelledby="addNodeModelLabel" data-bs-backdrop="static" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <form id="addNodeForm" th:action="@{/node/save}" method="post" th:object="${nodeParam}">
                <input type="hidden" name="id" id="add-id"/>
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">
                            <i class="fa-solid fa-cubes me-2"></i>新增服务节点
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
                    </div>
                    <div class="modal-body px-4 py-4">
                        <!-- 基本信息区域 -->
                        <h6 class="section-title">
                            <i class="fa-solid fa-info-circle me-1"></i>基本信息
                        </h6>

                        <div class="mb-3 row">
                            <label class="col-sm-3 col-form-label">节点名称 <span class="text-danger">*</span></label>
                            <div class="col-sm-9">
                                <input id="add-name" type="text" class="form-control" name="name"
                                       placeholder="请输入节点名称" required/>
                            </div>
                        </div>
                        <div class="mb-3 row">
                            <label class="col-sm-3 col-form-label">节点备注</label>
                            <div class="col-sm-9">
                                <input id="add-remark" type="text" class="form-control" name="remark"
                                       placeholder="请输入节点备注"/>
                            </div>
                        </div>
                        <div class="mb-4 row">
                            <label class="col-sm-3 col-form-label">所属集群 <span class="text-danger">*</span></label>
                            <div class="col-sm-9">
                                <select id="add-clusterId" name="clusterId" class="form-select select2-multiple">
                                    <option th:each="cluster : ${clusterOption}" th:value="${cluster.value}"
                                            th:text="${cluster.text}"></option>
                                </select>
                            </div>
                        </div>

                        <!-- 探活配置区域 -->
                        <h6 class="section-title">
                            <i class="fa-solid fa-heart-pulse me-1"></i>探活配置
                        </h6>

                        <div class="mb-3 row">
                            <label class="col-sm-3 col-form-label">探活方法 <span class="text-danger">*</span></label>
                            <div class="col-sm-9">
                                <select id="add-healthCheckMethod" name="healthCheckMethod"
                                        class="form-select select2-multiple">
                                    <option th:each="o : ${healthCheckerOption}" th:value="${o.value}"
                                            th:text="${o.text}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3 row" id="healthCheckCmdGroup">
                            <label class="col-sm-3 col-form-label">探活命令 <span class="text-danger">*</span></label>
                            <div class="col-sm-9">
                                <textarea id="add-healthCheckCmd" name="healthCheckCmd" class="form-control" rows="3"
                                          placeholder="请输入探活命令" required></textarea>
                                <div id="no-docker-notice-health" class="form-text d-none">非 Docker 探活方式时填写此字段</div>
                                <div id="docker-notice-health" class="form-text">Docker探活方式时,提填写json配置</div>
                            </div>
                        </div>

                        <!-- 重启配置区域 -->
                        <h6 class="section-title">
                            <i class="fa-solid fa-rotate-right me-1"></i>重启配置
                        </h6>

                        <div class="mb-3 row">
                            <label class="col-sm-3 col-form-label">重启方法 <span class="text-danger">*</span></label>
                            <div class="col-sm-9">
                                <select id="add-restartMethod" name="restartMethod"
                                        class="form-select select2-multiple">
                                    <option th:each="o : ${restarterOption}" th:value="${o.value}"
                                            th:text="${o.text}"></option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-3 row" id="restartCmdGroup">
                            <label class="col-sm-3 col-form-label">重启命令 <span class="text-danger">*</span></label>
                            <div class="col-sm-9">
                                <textarea id="add-restartCmd" name="restartCmd" class="form-control" rows="3"
                                          placeholder="请输入重启命令" required></textarea>
                                <div id="no-docker-notice-restart" class="form-text d-none">非 Docker 探活方式时填写此字段</div>
                                <div id="docker-notice-restart" class="form-text">Docker探活方式时,提填写json配置</div>
                            </div>
                        </div>

                    </div>

                    <div class="modal-footer">
                        <button type="submit" class="btn btn-primary px-4">
                            <i class="fa-solid fa-check me-1"></i>保存
                        </button>
                        <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">
                            <i class="fa-solid fa-xmark me-1"></i>取消
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- 删除二次确认弹窗 -->
    <div class="modal fade sentinel-modal danger-modal" id="confirmDeleteModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <form th:action="@{/node/delete}" method="post">
                    <input type="hidden" name="id" id="deleteNodeId"/>
                    <div class="modal-header">
                        <h5 class="modal-title">
                            <i class="fa-solid fa-triangle-exclamation me-2"></i>确认删除
                        </h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
                    </div>
                    <div class="modal-body text-center py-4">
                        <i class="fa-solid fa-circle-exclamation text-danger" style="font-size: 3rem;"></i>
                        <p class="mt-3 mb-0 fs-5">确定要删除节点 <strong class="text-danger" id="deleteNodeName"></strong> 吗？</p>
                        <p class="text-muted small mt-2">该操作不可撤销</p>
                    </div>
                    <div class="modal-footer justify-content-center">
                        <button type="button" class="btn btn-outline-secondary px-4" data-bs-dismiss="modal">
                            <i class="fa-solid fa-xmark me-1"></i>取消
                        </button>
                        <button type="submit" class="btn btn-danger px-4">
                            <i class="fa-solid fa-trash-can me-1"></i>确认删除
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>

<th:block th:insert="~{include :: footer}"/>
<script>
    /* ========== 新增/编辑弹窗逻辑 ========== */
    $('#addNodeModel').on('shown.bs.modal', function (event) {
        $('#addNodeForm')[0].reset();

        const $select = $('#add-clusterId');
        const $select2 = $('#add-healthCheckMethod');
        const $select3 = $('#add-restartMethod');

        $select.val(null).trigger('change');
        $select2.val(null).trigger('change');
        $select3.val(null).trigger('change');

        if (!$select.hasClass("select2-hidden-accessible")) {
            $select.select2({
                dropdownParent: $('#addNodeModel'),
                placeholder: "请选择所属集群",
                allowClear: true
            });
        }
        if (!$select2.hasClass("select2-hidden-accessible")) {
            $select2.select2({
                dropdownParent: $('#addNodeModel'),
                placeholder: "请选择节点健康检查器",
                allowClear: true
            });
        }
        if (!$select3.hasClass("select2-hidden-accessible")) {
            $select3.select2({
                dropdownParent: $('#addNodeModel'),
                placeholder: "请选择节点重启器",
                allowClear: true
            });
        }

        const button = event.relatedTarget;
        if (button.name === 'edit') {
            const row = JSON.parse(button.getAttribute("data-row"));
            const modal = $(this);
            for (let key in row) {
                const input = modal.find('#add-' + key);
                if (input.length > 0) {
                    input.val(row[key]).trigger('change');
                }
            }
        }

        updateFields();
    });

    $('#add-healthCheckMethod').on('change.select2', updateFields);
    $('#add-restartMethod').on('change.select2', updateFields);

    $('#confirmDeleteModal').on('show.bs.modal', function (event) {
        const button = event.relatedTarget;
        const id = button.getAttribute('data-id');
        const name = button.getAttribute('data-name');
        const modal = $(this);
        modal.find('#deleteNodeId').val(id);
        modal.find('#deleteNodeName').text(name);
    });

    function updateFields() {
        const healthCheckMethod = $('#add-healthCheckMethod').val();
        const restartMethod = $('#add-restartMethod').val();

        const isDockerChecker = healthCheckMethod === 'DOCKER_CHECKER';
        const isDockerClient = restartMethod === 'DOCKER_CLIENT';

        if (isDockerChecker) {
            $('#no-docker-notice-health').addClass('d-none');
            $('#docker-notice-health').removeClass('d-none');
        } else {
            $('#no-docker-notice-health').removeClass('d-none');
            $('#docker-notice-health').addClass('d-none');
        }

        if (isDockerClient) {
            $('#no-docker-notice-restart').addClass('d-none');
            $('#docker-notice-restart').removeClass('d-none');
        } else {
            $('#no-docker-notice-restart').removeClass('d-none');
            $('#docker-notice-restart').addClass('d-none');
        }
    }

    /* ========== 节点操作：检查 / 重启 ========== */
    var actionInProgress = false;

    $(document).on('click', '.btn-node-health, .btn-node-restart', function () {
        if (actionInProgress) {
            showToast('warning', '操作进行中，请稍后再试');
            return;
        }

        const $btn = $(this);
        const id = $btn.data('id');
        const name = $btn.data('name');
        const isCheck = $btn.hasClass('btn-node-health');
        const url = isCheck ? '/node/check' : '/node/restart';
        const actionLabel = isCheck ? '检查' : '重启';

        if (!confirm('确定要对节点【' + name + '】执行' + actionLabel + '操作吗？')) {
            return;
        }

        actionInProgress = true;
        const originalHtml = $btn.html();
        $btn.prop('disabled', true).html('<i class="fa-solid fa-spinner fa-spin me-1"></i>' + actionLabel + '中...');

        fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'id=' + encodeURIComponent(id)
        })
        .then(function (resp) { return resp.json(); })
        .then(function (data) {
            if (data.success) {
                showToast('success', '【' + name + '】' + actionLabel + '结果：' + (data.output || '成功'));
                // 延迟刷新页面以展示最新状态
                setTimeout(function () { location.reload(); }, 800);
            } else {
                showToast('danger', '【' + name + '】' + actionLabel + '失败：' + (data.output || '未知错误'));
            }
        })
        .catch(function (err) {
            showToast('danger', '【' + name + '】' + actionLabel + '请求异常：' + err.message);
        })
        .finally(function () {
            actionInProgress = false;
            $btn.prop('disabled', false).html(originalHtml);
        });
    });

    /* ========== Toast 提示 ========== */
    function showToast(type, message) {
        var bgClass = 'bg-success';
        var icon = 'fa-circle-check';
        if (type === 'danger') { bgClass = 'bg-danger'; icon = 'fa-circle-exclamation'; }
        else if (type === 'warning') { bgClass = 'bg-warning text-dark'; icon = 'fa-triangle-exclamation'; }

        var $toast = $(
            '<div class="toast align-items-center text-white border-0 ' + bgClass + '" role="alert" data-bs-delay="4000">' +
            '  <div class="d-flex">' +
            '    <div class="toast-body"><i class="fa-solid ' + icon + ' me-2"></i>' + message + '</div>' +
            '    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>' +
            '  </div>' +
            '</div>'
        );

        var $container = $('#toastContainer');
        if ($container.length === 0) {
            $container = $('<div id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999;"></div>');
            $('body').append($container);
        }
        $container.append($toast);
        var toast = new bootstrap.Toast($toast[0]);
        toast.show();
        $toast.on('hidden.bs.toast', function () { $(this).remove(); });
    }
</script>
<th:block th:insert="~{include :: select2-js}"/>
</body>
</html>
